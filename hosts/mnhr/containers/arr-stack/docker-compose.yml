---
services:
  radarr:
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    restart: no
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Lisbon
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - radarr-config:/config
      - /storage/media:/data
    network_mode: service:gluetun
    depends_on:
      - gluetun

  sonarr:
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    restart: no
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Lisbon
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - sonarr-config:/config
      - /storage/media:/data
    network_mode: service:gluetun
    depends_on:
      - gluetun

  bazarr:
    container_name: bazarr
    image: ghcr.io/hotio/bazarr:latest
    restart: no
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Lisbon
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - bazarr-config:/config
      - /storage/media/library:/data/library
    network_mode: service:gluetun
    depends_on:
      - gluetun

  lidarr:
    container_name: lidarr
    image: ghcr.io/hotio/lidarr:latest
    restart: no
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Lisbon
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - lidarr-config:/config
      - /storage/media:/data
    network_mode: service:gluetun
    depends_on:
      - gluetun

  readarr:
    container_name: readarr
    image: ghcr.io/hotio/readarr:latest
    restart: no
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Lisbon
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - readarr-config:/config
      - /storage/media:/data
    network_mode: service:gluetun
    depends_on:
      - gluetun

  prowlarr:
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr
    restart: no
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Lisbon
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - prowlarr-config:/config
    network_mode: service:gluetun
    depends_on:
      - gluetun

  qbittorrent-nox:
    image: ghcr.io/linuxserver/qbittorrent
    restart: no
    container_name: qbittorrent
    stop_grace_period: 30m
    environment:
      - PUID=1000
      - PGID=100
      - TZ=Europe/Lisbon
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
    volumes:
      - qbittorrent-config:/config
      - /storage/media:/downloads
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
  gluetun:
    container_name: gluetun
    image: qmcgaw/gluetun
    restart: no
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      SERVER_COUNTRIES: Ukraine
      VPN_TYPE: wireguard
      PORT_FORWARD_ONLY: on
      WIREGUARD_PRIVATE_KEY:
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      # Radarr
      - traefik.http.routers.radarr.rule=Host(`${RADARR_DOMAIN_NAME}`)
      - traefik.http.routers.radarr.tls=true
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.tls.certresolver=stepca
      - traefik.http.routers.radarr.service=radarr
      - traefik.http.services.radarr.loadbalancer.server.port=7878
      # # Sonarr
      - traefik.http.routers.sonarr.rule=Host(`${SONARR_DOMAIN_NAME}`)
      - traefik.http.routers.sonarr.tls=true
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.routers.sonarr.tls.certresolver=stepca
      - traefik.http.routers.sonarr.service=sonarr
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
      # # Bazarr
      - traefik.http.routers.bazarr.rule=Host(`${BAZARR_DOMAIN_NAME}`)
      - traefik.http.routers.bazarr.tls=true
      - traefik.http.routers.bazarr.entrypoints=websecure
      - traefik.http.routers.bazarr.tls.certresolver=stepca
      - traefik.http.routers.bazarr.service=bazarr
      - traefik.http.services.bazarr.loadbalancer.server.port=6767
      # # Lidarr
      - traefik.http.routers.lidarr.rule=Host(`${LIDARR_DOMAIN_NAME}`)
      - traefik.http.routers.lidarr.tls=true
      - traefik.http.routers.lidarr.entrypoints=websecure
      - traefik.http.routers.lidarr.tls.certresolver=stepca
      - traefik.http.routers.lidarr.service=lidarr
      - traefik.http.services.lidarr.loadbalancer.server.port=8686
      # # Readarr
      - traefik.http.routers.readarr.rule=Host(`${READARR_DOMAIN_NAME}`)
      - traefik.http.routers.readarr.tls=true
      - traefik.http.routers.readarr.entrypoints=websecure
      - traefik.http.routers.readarr.tls.certresolver=stepca
      - traefik.http.routers.readarr.service=readarr
      - traefik.http.services.readarr.loadbalancer.server.port=8787
      # # Prowlarr
      - traefik.http.routers.prowlarr.rule=Host(`${PROWLARR_DOMAIN_NAME}`)
      - traefik.http.routers.prowlarr.tls=true
      - traefik.http.routers.prowlarr.entrypoints=websecure
      - traefik.http.routers.prowlarr.tls.certresolver=stepca
      - traefik.http.routers.prowlarr.service=prowlarr
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
      # # qBittorrent
      - traefik.http.routers.qbittorrent.rule=Host(`${QBITTORRENT_DOMAIN_NAME}`)
      - traefik.http.routers.qbittorrent.tls=true
      - traefik.http.routers.qbittorrent.entrypoints=websecure
      - traefik.http.routers.qbittorrent.tls.certresolver=stepca
      - traefik.http.routers.qbittorrent.service=qbittorrent
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080

    dns_search: proxy
    networks:
      proxy:

volumes:
  radarr-config:
  sonarr-config:
  bazarr-config:
  lidarr-config:
  readarr-config:
  prowlarr-config:
  jellyseerr-config:
  qbittorrent-config:

networks:
  proxy:
    external: true
